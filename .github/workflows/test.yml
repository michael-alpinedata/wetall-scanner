name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Setup Python
        run: uv python install
        
      - name: Install dependencies
        run: uv sync
        
      - name: Run tests
        run: uv run pytest -v
        
