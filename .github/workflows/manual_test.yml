name: Manual Render Trigger

on:
  workflow_dispatch: # Active le bouton manuel dans l'onglet Actions

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler l'API de Scan sur Render
        run: |
          curl -X POST ${{ secrets.RENDER_API_URL }}/trigger-scan \
               -H "x-secret-key: ${{ secrets.SCAN_SECRET_KEY }}" \
               -H "Content-Type: application/json"
               
