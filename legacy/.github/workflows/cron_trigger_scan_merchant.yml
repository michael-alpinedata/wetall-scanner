name: Cron Trigger Scan

on:
  schedule:
    # 0,30 21-23,0-4 UTC correspond à 23h-06h Paris (UTC+2)
    - cron: '0,15,30,45 21-23,0-4 * * *'
  workflow_dispatch:

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API Scan
        # curl -X POST "${{ secrets.RENDER_API_URL }}/trigger-scan?mode=discovery&limit=50" \
        run: |
          curl -X POST "${{ secrets.RENDER_API_URL }}/trigger-scan?mode=rescan&limit=200" \
               -H "X-Secret-Key: ${{ secrets.SCAN_SECRET_KEY }}" \
               -f

