repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check & fix
        entry: uv run ruff check --fix
        language: system
        types: [python]
        stages: [pre-commit]  # <-- Corrigé avec un 's'

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        stages: [pre-commit]  # <-- Corrigé avec un 's'