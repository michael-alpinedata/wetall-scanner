[project]
name = "wetall-links-checker"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "curl-cffi>=0.15.0",
    "httpx>=0.28.1",
    "lxml>=6.1.1",
    "plotly>=6.7.0",
    "psycopg2-binary>=2.9.12",
    "python-dotenv>=1.2.2",
    "streamlit>=1.58.0",
]

[dependency-groups]
dev = [
    "fastapi>=0.136.3",
    "pre-commit>=4.6.0",
    "ruff>=0.15.15",
    "uvicorn>=0.48.0",
]

[tool.ruff]
# Applique le style compatible avec Black
line-length = 88 

[tool.ruff.lint]
select = ["E", "F", "I"] # E=errors, F=flakes, I=isort (tri imports)
